kind = "web"
previewPath = "/"
title = "Poem Translator & Explainer"
version = "1.0.0"
id = "artifacts/poem-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25973

[services.development]
run = "pnpm --filter @workspace/poem-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poem-app", "run", "build" ]
publicDir = "artifacts/poem-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25973"
BASE_PATH = "/"
